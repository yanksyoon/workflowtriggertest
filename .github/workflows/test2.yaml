name: E2E

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  echo_hello:
    runs-on: "${{ matrix.flavor }}"
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - [hello, world]
    steps:
      - name: Print env
        run: env
      - name: Print event
        run: cat "$GITHUB_EVENT_PATH"
