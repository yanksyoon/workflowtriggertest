name: E2E

on:
  issue_comment:
    types: [created]
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runs-on: "${{ matrix.flavor }}"
  echo_hello:
    name: Echo Hello
    strategy:
      fail-fast: false
      matrix:
        flavor:
          - hello,world
    steps:
      - name: apt-get
        if: always()
        run: |
          for i in {1..10}; do sudo apt-get update; done
          sudo apt-get install python3-venv llvm -y
