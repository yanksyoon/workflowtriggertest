name: E2E

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  runs-on: "${{ matrix.flavor }}"
  strategy:
    fail-fast: false
    matrix:
      flavor:
        - [hello, world]
  echo_hello:
    name: Echo Hello
    steps:
      - name: apt-get
        if: always()
      - name: Print env
        run: env
      - name: Print event
        run: cat "$GITHUB_EVENT_PATH"
